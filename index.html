<script>

// ================= STATE =================
const State = {
    cart: JSON.parse(localStorage.getItem("cart")) || [],
    user: JSON.parse(localStorage.getItem("user"))
};

// ================= UTIL =================
const $ = (id) => document.getElementById(id);

const Storage = {
    getOrders: () => JSON.parse(localStorage.getItem("orders") || "[]"),
    saveOrders: (orders) => localStorage.setItem("orders", JSON.stringify(orders)),
    saveCart: () => localStorage.setItem("cart", JSON.stringify(State.cart))
};

// ================= AUTH =================
const Auth = {
    login(name, id) {
        const role = id === "admin123" ? "admin" : "user";
        State.user = { name, id, role };
        localStorage.setItem("user", JSON.stringify(State.user));
    },

    logout() {
        localStorage.removeItem("user");
        location.reload();
    }
};

// ================= CART =================
const Cart = {
    add(name, price) {
        const item = State.cart.find(i => i.name === name);
        item ? item.qty++ : State.cart.push({ name, price, qty: 1 });
        Storage.saveCart();
        UI.renderCart();
    },

    update(index, change) {
        State.cart[index].qty += change;
        if (State.cart[index].qty <= 0) State.cart.splice(index, 1);
        Storage.saveCart();
        UI.renderCart();
    },

    remove(index) {
        State.cart.splice(index, 1);
        Storage.saveCart();
        UI.renderCart();
    },

    clear() {
        State.cart = [];
        Storage.saveCart();
        UI.renderCart();
    },

    total() {
        return State.cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    }
};

// ================= ORDER =================
const Order = {
    place() {
        if (State.cart.length === 0) return alert("Cart is empty");

        const payment = $("payment").value;
        const time = $("time").value;

        if (!time) return alert("Select pickup time");

        const order = {
            id: "ORD" + Date.now(),
            user: State.user,
            cart: structuredClone(State.cart),
            payment,
            time,
            status: "Pending",
            createdAt: new Date().toLocaleString()
        };

        const orders = Storage.getOrders();
        orders.push(order);
        Storage.saveOrders(orders);

        alert(`Order placed! ID: ${order.id}`);

        Cart.clear();
        UI.renderHistory();
    }
};

// ================= UI =================
const UI = {

    init() {
        if (State.user) {
            $("loginBox").classList.add("hidden");
            $("mainApp").classList.remove("hidden");
            $("welcome").innerText = `Welcome ${State.user.name}`;
            this.renderCart();
            this.renderHistory();
        }
    },

    renderCart() {
        const cartDiv = $("cart");
        cartDiv.innerHTML = "";

        State.cart.forEach((item, i) => {
            cartDiv.innerHTML += `
            <div class="cart-item">
                ${item.name} x${item.qty}
                <span>
                    <button onclick="Cart.update(${i},1)">+</button>
                    <button onclick="Cart.update(${i},-1)">-</button>
                    <button class="remove" onclick="Cart.remove(${i})">x</button>
                </span>
            </div>`;
        });

        $("total").innerText = Cart.total();
    },

    renderHistory() {
        const historyDiv = $("history");
        const orders = Storage.getOrders();

        historyDiv.innerHTML = "";

        orders
            .filter(o => o.user.id === State.user.id)
            .forEach(o => {
                const items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");

                historyDiv.innerHTML += `
                <p>
                    <b>${o.id}</b><br>
                    ${items}<br>
                    ${o.time} | ${o.payment} | ${o.status}
                </p>`;
            });
    },

    renderAdmin() {
        if (State.user.role !== "admin") {
            alert("Access denied");
            return;
        }

        const adminDiv = $("admin");
        const orders = Storage.getOrders();

        adminDiv.innerHTML = "";

        orders.forEach(o => {
            const items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");

            adminDiv.innerHTML += `
            <p>
                <b>${o.id}</b><br>
                ${o.user.name} (${o.user.id})<br>
                ${items}<br>
                ${o.time} | ${o.payment}
            </p>`;
        });
    }
};

// ================= EVENTS =================
function login() {
    const name = $("studentName").value.trim();
    const id = $("studentId").value.trim();

    if (!name || !id) return alert("Enter valid details");

    Auth.login(name, id);
    UI.init();
}

function logout() {
    Auth.logout();
}

function add(name, price) {
    Cart.add(name, price);
}

function changeQty(i, val) {
    Cart.update(i, val);
}

function removeItem(i) {
    Cart.remove(i);
}

function placeOrder() {
    Order.place();
}

function showOrders() {
    UI.renderAdmin();
}

// ================= START =================
window.onload = () => UI.init();

</script>
