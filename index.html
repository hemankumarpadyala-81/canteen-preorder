<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Canteen Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f3f4f6;}
header { background:#111827; color:#fff; padding:15px; text-align:center;}
.container { display:flex; flex-wrap:wrap; padding:10px;}
.box { background:#fff; margin:10px; padding:15px; border-radius:10px; flex:1; min-width:280px;}
.hidden{display:none;}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
background:#2563eb;
color:white;
}

button.danger{background:red;}
button.success{background:green;}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:10px;
}

.card{
background:#fafafa;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:90px;
object-fit:cover;
border-radius:8px;
}

.cart-item{
display:flex;
justify-content:space-between;
}

.canteen-card img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

.canteen-card{
text-align:center;
background:#fafafa;
padding:10px;
border-radius:10px;
margin:10px 0;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>🍽️ Smart Canteen Pro</header>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h3>Login</h3>
<input id="nameInput" placeholder="Name"><br><br>
<input id="idInput" placeholder="ID"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- CANTEEN -->
<div id="canteenBox" class="box hidden">
<h3>Select Canteen</h3>

<div class="canteen-card" onclick="selectCanteen('BALL 1')">
<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
<p>BALL 1</p>
</div>

<div class="canteen-card" onclick="selectCanteen('BALL 2')">
<img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
<p>BALL 2</p>
</div>

<div class="canteen-card" onclick="selectCanteen('PENCIL')">
<img src="https://images.unsplash.com/photo-1559339352-11d035aa65de">
<p>PENCIL</p>
</div>

<div class="canteen-card" onclick="selectCanteen('KC CANTEEN')">
<img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24">
<p>KC CANTEEN</p>
</div>

<div class="canteen-card" onclick="selectCanteen('3RD CAMPUS')">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc500f">
<p>3RD CAMPUS</p>
</div>

</div>

<!-- MAIN APP -->
<div id="app" class="hidden">

<div class="box">
<p id="welcome"></p>
</div>

<!-- MENU -->
<div class="box">
<h3>Menu</h3>
<div id="menu"></div>
</div>

<!-- CART -->
<div class="box">
<h3>Cart</h3>
<div id="cart"></div>
<p>Total: ₹<span id="total">0</span></p>
<button class="success" onclick="placeOrder()">Place Order</button>
</div>

<!-- QR -->
<div class="box">
<h3>QR</h3>
<div id="qr"></div>
</div>

<!-- HISTORY -->
<div class="box">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>

let cartItems=[];

// MENUS WITH IMAGES
const menus={
"BALL 1":{
Snacks:[
["Samosa",20,"https://images.unsplash.com/photo-1601050690597-df0568f70950"],
["Sandwich",40,"https://images.unsplash.com/photo-1550507992-eb63ffee0847"]
],
Lunch:[
["Biryani",120,"https://images.unsplash.com/photo-1604908176997-125f25cc500f"],
["Fried Rice",100,"https://images.unsplash.com/photo-1603133872878-684f208fb84b"]
]
},
"PENCIL":{
Snacks:[
["Burger",50,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
],
Lunch:[
["Biryani",120,"https://images.unsplash.com/photo-1604908176997-125f25cc500f"]
]
}
};

function login(){
let name=document.getElementById("nameInput").value;
let id=document.getElementById("idInput").value;
if(!name||!id)return alert("Enter details");

localStorage.setItem("user",JSON.stringify({name,id}));

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("canteenBox").classList.remove("hidden");
}

function selectCanteen(c){
localStorage.setItem("canteen",c);

document.getElementById("canteenBox").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

let user=JSON.parse(localStorage.getItem("user"));
document.getElementById("welcome").innerText=`Welcome ${user.name} | ${c}`;

loadMenu(c);
}

function loadMenu(c){
let menuDiv=document.getElementById("menu");
menuDiv.innerHTML="";

let data=menus[c];
if(!data){menuDiv.innerHTML="No menu";return;}

for(let cat in data){
menuDiv.innerHTML+=`<h4>${cat}</h4><div class="menu-grid">`;

data[cat].forEach(item=>{
menuDiv.innerHTML+=`
<div class="card">
<img src="${item[2]}">
<p>${item[0]} ₹${item[1]}</p>
<button onclick="addItem('${item[0]}',${item[1]})">Add</button>
</div>`;
});

menuDiv.innerHTML+=`</div>`;
}
}

function addItem(n,p){
let item=cartItems.find(i=>i.name==n);
if(item)item.qty++;
else cartItems.push({name:n,price:p,qty:1});
renderCart();
}

function renderCart(){
let cartDiv=document.getElementById("cart");
cartDiv.innerHTML="";
let t=0;

cartItems.forEach((i)=>{
t+=i.price*i.qty;
cartDiv.innerHTML+=`${i.name} x${i.qty}<br>`;
});

document.getElementById("total").innerText=t;
}

function placeOrder(){
if(cartItems.length==0)return alert("Empty");

let order={id:"ORD"+Date.now(),cart:cartItems,status:"Pending"};

let orders=JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(order);
localStorage.setItem("orders",JSON.stringify(orders));

qr.innerHTML="";
new QRCode(qr,order.id);

cartItems=[];
renderCart();
alert("Ordered!");
}

function loadHistory(){
let orders=JSON.parse(localStorage.getItem("orders")||"[]");
history.innerHTML="";

orders.forEach(o=>{
history.innerHTML+=`${o.id} (${o.status})<br>`;
});
}

</script>

</body>
</html>
