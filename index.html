<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Canteen System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
}
header {
    background: #2c3e50;
    color: #fff;
    padding: 15px;
    text-align: center;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.card {
    background: #fff;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
}
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    background: #2980b9;
    color: #fff;
    cursor: pointer;
}
button:hover {
    opacity: 0.9;
}
input, select {
    padding: 8px;
    margin: 5px 0;
    width: 100%;
}
.hidden {
    display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Login</h2>
<input id="name" placeholder="Name">
<input id="id" placeholder="ID">
<button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
<header><h2 id="welcome"></h2></header>

<div class="container">

<select id="canteen" onchange="loadMenu()">
<option value="Ball">Ball</option>
<option value="Pencil">Pencil</option>
<option value="KC">KC</option>
</select>

<h3>Menu</h3>
<div id="menu"></div>

<h3>Cart</h3>
<div id="cart"></div>
<p id="total">Total: ₹0</p>
<button onclick="placeOrder()">Place Order</button>

<h3>Order History</h3>
<div id="history"></div>

<button onclick="logout()">Logout</button>

</div>
</div>

<script>
'use strict';

let cart = [];

// MENU DATA
const menus = {
    Ball: [
        {name:"Burger", price:50},
        {name:"Fries", price:40}
    ],
    Pencil: [
        {name:"Pizza", price:120},
        {name:"Coffee", price:20}
    ],
    KC: [
        {name:"Dosa", price:30}
    ]
};

// LOGIN
async function login(){
    const name = document.getElementById("name").value.trim();
    const id = document.getElementById("id").value.trim();

    if(!name || !id){
        alert("Enter details");
        return;
    }

    try {
        await fetch("/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,id})
        });
    } catch (e) {
        console.warn("Backend not connected");
    }

    localStorage.setItem("user", JSON.stringify({name,id}));

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("welcome").innerText = "Welcome " + name;

    loadMenu();
    loadHistory();
}

// LOAD MENU
function loadMenu(){
    const canteen = document.getElementById("canteen").value;
    const menuDiv = document.getElementById("menu");

    menuDiv.innerHTML = "";

    menus[canteen].forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            ${item.name} ₹${item.price}
            <button>Add</button>
        `;

        card.querySelector("button").onclick = () => add(item);

        menuDiv.appendChild(card);
    });
}

// ADD TO CART
function add(item){
    const found = cart.find(i => i.name === item.name);
    if(found) found.qty++;
    else cart.push({...item, qty:1});

    renderCart();
}

// RENDER CART
function renderCart(){
    const cartDiv = document.getElementById("cart");
    let total = 0;

    cartDiv.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price * item.qty;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            ${item.name} x${item.qty}
            <button onclick="changeQty(${index},1)">+</button>
            <button onclick="changeQty(${index},-1)">-</button>
        `;

        cartDiv.appendChild(div);
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

// CHANGE QTY
function changeQty(index, value){
    cart[index].qty += value;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    renderCart();
}

// PLACE ORDER
async function placeOrder(){
    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    const user = JSON.parse(localStorage.getItem("user"));

    try {
        const res = await fetch("/order", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                user_id:user.id,
                canteen:document.getElementById("canteen").value,
                items:cart
            })
        });

        const data = await res.json();
        alert("Order placed! ID: " + data.order_id);

    } catch (e) {
        alert("Order placed locally (backend not connected)");
    }

    cart = [];
    renderCart();
    loadHistory();
}

// LOAD HISTORY
async function loadHistory(){
    const user = JSON.parse(localStorage.getItem("user"));
    const div = document.getElementById("history");

    div.innerHTML = "";

    try {
        const res = await fetch(`/orders/${user.id}`);
        const orders = await res.json();

        orders.forEach(o => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerText = `${o.id} - ${o.canteen} (${o.status})`;
            div.appendChild(card);
        });

    } catch (e) {
        div.innerHTML = "<p>No backend connection</p>";
    }
}

// LOGOUT
function logout(){
    localStorage.clear();
    location.reload();
}

// AUTO LOGIN
window.onload = () => {
    const user = localStorage.getItem("user");

    if(user){
        const data = JSON.parse(user);

        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        document.getElementById("welcome").innerText = "Welcome " + data.name;

        loadMenu();
        loadHistory();
    }
};
</script>

</body>
</html>
