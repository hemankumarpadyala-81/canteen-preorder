<!DOCTYPE html>
<html>
<head>
    <title>Canteen Pre-Order</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        .container {
            display: none;
        }

        .login {
            margin-top: 100px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        h1 {
            background: #333;
            color: white;
            padding: 10px;
        }

        .menu {
            margin: 20px;
        }

        .item {
            background: white;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
        }

        .item img {
            width: 100%;
            height: 120px;
            border-radius: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        #cart {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }

        .deleteBtn {
            background: red;
            margin-left: 10px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
    <h2>Login</h2>
    <input type="text" id="name" placeholder="Enter Name"><br>
    <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div class="container" id="mainPage">

<h1>Canteen Pre-Order</h1>

<div class="menu">

    <div class="item">
        <img src="https://via.placeholder.com/200x120">
        <h3>Burger</h3>
        <p>₹50</p>
        <button onclick="addToCart('Burger',50)">Add</button>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/200x120">
        <h3>Pizza</h3>
        <p>₹100</p>
        <button onclick="addToCart('Pizza',100)">Add</button>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/200x120">
        <h3>Sandwich</h3>
        <p>₹40</p>
        <button onclick="addToCart('Sandwich',40)">Add</button>
    </div>

</div>

<div id="cart">
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>

    <label>Pickup Time:</label><br>
    <input type="time" id="time"><br><br>

    <button onclick="placeOrder()">Place Order</button>
</div>

</div>

<script>
    let cart = [];

    function login() {
        let name = document.getElementById("name").value;
        if(name === "") {
            alert("Enter your name");
            return;
        }
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
    }

    function addToCart(item, price) {
        cart.push({item, price});
        displayCart();
    }

    function deleteItem(index) {
        cart.splice(index,1);
        displayCart();
    }

    function displayCart() {
        let list = document.getElementById("cartItems");
        let total = 0;
        list.innerHTML = "";

        cart.forEach((i, index) => {
            total += i.price;

            let li = document.createElement("li");
            li.innerHTML = i.item + " - ₹" + i.price +
            ` <button class="deleteBtn" onclick="deleteItem(${index})">X</button>`;
            
            list.appendChild(li);
        });

        document.getElementById("total").innerText = total;
    }

    function placeOrder() {
        let time = document.getElementById("time").value;

        if(cart.length === 0) {
            alert("Cart is empty!");
            return;
        }

        if(time === "") {
            alert("Select pickup time!");
            return;
        }

        alert("Order placed successfully!\nPickup at: " + time);
        cart = [];
        displayCart();
    }
</script>

</body>
</html>
