<script>

let cart = [];

/* ---------- INIT ---------- */
window.onload = () => {
    const user = getUser();
    if (user) initApp();
};

/* ---------- HELPERS ---------- */
function getEl(id) {
    return document.getElementById(id);
}

function getUser() {
    return JSON.parse(localStorage.getItem("user"));
}

function getOrders() {
    return JSON.parse(localStorage.getItem("orders") || "[]");
}

function saveOrders(data) {
    localStorage.setItem("orders", JSON.stringify(data));
}

/* ---------- LOGIN ---------- */
function login() {
    const name = getEl("studentName").value.trim();
    const id = getEl("studentId").value.trim();

    if (!name || !id) {
        alert("Enter valid details");
        return;
    }

    const role = (id === "admin123") ? "admin" : "user";

    localStorage.setItem("user", JSON.stringify({ name, id, role }));
    initApp();
}

/* ---------- INIT APP ---------- */
function initApp() {
    const user = getUser();

    getEl("loginBox").classList.add("hidden");
    getEl("mainApp").classList.remove("hidden");
    getEl("welcome").innerText = `Welcome ${user.name}`;

    loadHistory();
}

/* ---------- LOGOUT ---------- */
function logout() {
    localStorage.removeItem("user");
    location.reload();
}

/* ---------- CART ---------- */
function add(name, price) {
    const item = cart.find(i => i.name === name);

    if (item) item.qty++;
    else cart.push({ name, price, qty: 1 });

    renderCart();
}

function renderCart() {
    const cartDiv = getEl("cart");
    const totalEl = getEl("total");

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((i, index) => {
        total += i.price * i.qty;

        cartDiv.innerHTML += `
        <div class="cart-item">
            ${i.name} x${i.qty}
            <span>
                <button onclick="updateQty(${index},1)">+</button>
                <button onclick="updateQty(${index},-1)">-</button>
                <button class="remove" onclick="removeItem(${index})">x</button>
            </span>
        </div>`;
    });

    totalEl.innerText = total;
}

function updateQty(index, change) {
    cart[index].qty += change;

    if (cart[index].qty <= 0) {
        cart.splice(index, 1);
    }

    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

/* ---------- ORDER ---------- */
function placeOrder() {
    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    const user = getUser();
    const payment = getEl("payment").value;
    const time = getEl("time").value;

    if (!time) {
        alert("Select pickup time");
        return;
    }

    const order = {
        id: "ORD" + Date.now(),
        user,
        cart: structuredClone(cart),
        payment,
        time,
        status: "Pending"
    };

    const orders = getOrders();
    orders.push(order);
    saveOrders(orders);

    alert(`Order placed! ID: ${order.id}`);

    cart = [];
    renderCart();
    loadHistory();
}

/* ---------- HISTORY ---------- */
function loadHistory() {
    const user = getUser();
    const orders = getOrders();

    const historyDiv = getEl("history");
    historyDiv.innerHTML = "";

    orders
        .filter(o => o.user.id === user.id)
        .forEach(o => {
            const items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");

            historyDiv.innerHTML += `
            <p>
                <b>${o.id}</b><br>
                ${items}<br>
                ${o.time} | ${o.payment} | ${o.status}
            </p>`;
        });
}

/* ---------- ADMIN ---------- */
function showOrders() {
    const user = getUser();

    if (user.role !== "admin") {
        alert("Access denied");
        return;
    }

    const orders = getOrders();
    const adminDiv = getEl("admin");

    adminDiv.innerHTML = "";

    orders.forEach(o => {
        const items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");

        adminDiv.innerHTML += `
        <p>
            <b>${o.id}</b><br>
            ${o.user.name} (${o.user.id})<br>
            ${items}<br>
            ${o.time} | ${o.payment} | ${o.status}
        </p>`;
    });
}

</script>
