<script>

// ================= STATE =================
const State = {
    user: JSON.parse(localStorage.getItem("user")),
    canteen: localStorage.getItem("canteen"),
    cart: JSON.parse(localStorage.getItem("cart")) || [],
    undo: [],
    redo: []
};

// ================= UTIL =================
const $ = (id) => document.getElementById(id);

const Storage = {
    saveCart() {
        localStorage.setItem("cart", JSON.stringify(State.cart));
    },
    getOrders() {
        return JSON.parse(localStorage.getItem("orders") || "[]");
    },
    saveOrders(data) {
        localStorage.setItem("orders", JSON.stringify(data));
    }
};

// ================= DATA =================
const menus = {
    "BALL 1":[
        {name:"Biryani",price:120},
        {name:"Samosa",price:20},
        {name:"Coke",price:20}
    ],
    "BALL 2":[
        {name:"Fried Rice",price:100},
        {name:"Sandwich",price:40}
    ],
    "PENCIL":[
        {name:"Burger",price:50}
    ],
    "KC CANTEEN":[
        {name:"Dosa",price:40}
    ]
};

// ================= AUTH =================
const Auth = {
    login(name,id){
        const role = (id === "admin123") ? "admin" : "user";
        State.user = {name,id,role};
        localStorage.setItem("user", JSON.stringify(State.user));
    },
    logout(){
        localStorage.clear();
        location.reload();
    }
};

// ================= CART =================
const Cart = {

    saveState(){
        State.undo.push(JSON.stringify(State.cart));
        State.redo = [];
    },

    add(item){
        this.saveState();

        const existing = State.cart.find(i=>i.name===item.name);
        existing ? existing.qty++ : State.cart.push({...item, qty:1});

        Storage.saveCart();
        UI.renderCart();
    },

    undo(){
        if(!State.undo.length) return;

        State.redo.push(JSON.stringify(State.cart));
        State.cart = JSON.parse(State.undo.pop());

        Storage.saveCart();
        UI.renderCart();
    },

    redo(){
        if(!State.redo.length) return;

        State.undo.push(JSON.stringify(State.cart));
        State.cart = JSON.parse(State.redo.pop());

        Storage.saveCart();
        UI.renderCart();
    },

    clear(){
        State.cart = [];
        Storage.saveCart();
        UI.renderCart();
    },

    total(){
        return State.cart.reduce((sum,i)=>sum+i.price*i.qty,0);
    }
};

// ================= ORDER =================
const Order = {
    place(){
        if(State.cart.length===0) return alert("Cart empty");

        const order = {
            id:"ORD"+Date.now(),
            user:State.user,
            canteen:State.canteen,
            cart: structuredClone(State.cart),
            status:"Pending",
            time:new Date().toLocaleString()
        };

        const orders = Storage.getOrders();
        orders.push(order);
        Storage.saveOrders(orders);

        Cart.clear();
        UI.renderHistory();

        alert("Order placed!");
    }
};

// ================= UI =================
const UI = {

    init(){
        if(State.user && State.canteen){
            $("loginBox").classList.add("hidden");
            $("canteenBox").classList.add("hidden");
            $("app").classList.remove("hidden");

            $("welcome").innerText =
                `Welcome ${State.user.name} | ${State.canteen}`;

            this.renderMenu();
            this.renderCart();
            this.renderHistory();
        }
    },

    renderMenu(){
        const div = $("menu");
        div.innerHTML = "";

        const data = menus[State.canteen];
        if(!data) return div.innerHTML="No menu";

        data.forEach(item=>{
            div.innerHTML += `
            <div class="card">
                <p>${item.name} ₹${item.price}</p>
                <button onclick='Cart.add(${JSON.stringify(item)})'>
                    Add
                </button>
            </div>`;
        });
    },

    renderCart(){
        const div = $("cart");
        div.innerHTML = "";

        State.cart.forEach(i=>{
            div.innerHTML += `
            <div class="cart-item">
                ${i.name} x${i.qty}
            </div>`;
        });

        $("total").innerText = Cart.total();
    },

    renderHistory(){
        if(!State.user) return;

        const orders = Storage.getOrders();
        const div = $("history");
        div.innerHTML = "";

        orders
        .filter(o=>o.user.id===State.user.id)
        .reverse()
        .forEach(o=>{
            div.innerHTML += `
            <b>${o.id}</b> - ${o.status}<br>
            ${o.cart.map(i=>i.name+" x"+i.qty).join(", ")}
            <hr>`;
        });
    },

    renderAdmin(){
        if(State.user.role!=="admin") return alert("Access denied");

        const orders = Storage.getOrders();
        const div = $("admin");
        div.innerHTML = "";

        orders.forEach(o=>{
            div.innerHTML += `
            ${o.id} - ${o.user.name} - ${o.canteen} - ${o.status}<br>`;
        });
    }
};

// ================= NAV =================
function login(){
    const name=$("name").value.trim();
    const id=$("id").value.trim();

    if(!name||!id) return alert("Enter details");

    Auth.login(name,id);
    $("loginBox").classList.add("hidden");
    $("canteenBox").classList.remove("hidden");
}

function selectCanteen(c){
    State.canteen = c;
    localStorage.setItem("canteen", c);
    UI.init();
}

function goBackLogin(){
    $("canteenBox").classList.add("hidden");
    $("loginBox").classList.remove("hidden");
}

function goBackCanteen(){
    $("app").classList.add("hidden");
    $("canteenBox").classList.remove("hidden");
}

// ================= EVENTS =================
function addItem(n,p){ Cart.add({name:n,price:p}); }
function undo(){ Cart.undo(); }
function redo(){ Cart.redo(); }
function placeOrder(){ Order.place(); }
function showOrders(){ UI.renderAdmin(); }
function logout(){ Auth.logout(); }

// ================= START =================
window.onload = () => UI.init();

</script>
