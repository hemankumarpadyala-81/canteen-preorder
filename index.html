<!DOCTYPE html>
<html>
<head>
    <title>Canteen Pre-Order</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div id="loginPage">
    <h2>Login</h2>
    <input type="text" id="name" placeholder="Enter Name">
    <button onclick="login()">Login</button>
</div>

<div id="mainPage" style="display:none;">
    <h1>Canteen Pre-Order</h1>
    <h2 id="welcome"></h2>

    <div id="menu"></div>

    <div id="cart">
        <h2>Cart</h2>
        <ul id="cartItems"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <input type="time" id="time">
        <button onclick="placeOrder()">Place Order</button>
    </div>
</div>

<script>
let cart = [];

/* LOGIN */
async function login() {
    const name = document.getElementById("name").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({name})
    });

    const data = await res.json();

    if (res.ok) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        document.getElementById("welcome").innerText = data.message;
        loadMenu();
    } else {
        alert(data.error);
    }
}

/* MENU */
async function loadMenu() {
    const res = await fetch("/menu");
    const data = await res.json();

    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "";

    data.forEach(item => {
        menuDiv.innerHTML += `
            <div class="item">
                <h3>${item.name}</h3>
                <p>₹${item.price}</p>
                <button onclick="addToCart('${item.name}', ${item.price})">
                    Add
                </button>
            </div>
        `;
    });
}

/* CART */
function addToCart(name, price) {
    const item = cart.find(i => i.name === name);

    if (item) item.qty++;
    else cart.push({name, price, qty: 1});

    displayCart();
}

function displayCart() {
    let total = 0;
    const list = document.getElementById("cartItems");
    list.innerHTML = "";

    cart.forEach((i, index) => {
        const itemTotal = i.price * i.qty;
        total += itemTotal;

        list.innerHTML += `
            <li>
                ${i.name} x ${i.qty} - ₹${itemTotal}
                <button onclick="removeItem(${index})">X</button>
            </li>
        `;
    });

    document.getElementById("total").innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    displayCart();
}

/* ORDER */
async function placeOrder() {
    const time = document.getElementById("time").value;

    if (cart.length === 0) return alert("Cart empty");
    if (!time) return alert("Select time");

    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

    const res = await fetch("/order", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: cart, total, pickup_time: time})
    });

    const data = await res.json();

    if (res.ok) {
        alert("Order placed!");
        cart = [];
        displayCart();
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
