<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Canteen System</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
header { background:#2c3e50; color:#fff; padding:15px; text-align:center; }
.container { max-width:900px; margin:auto; padding:20px; }

.card {
    background:#fff;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:5px;
    background:#2980b9;
    color:#fff;
    cursor:pointer;
}

button:disabled { opacity:0.5; cursor:not-allowed; }

input, select {
    width:100%;
    padding:8px;
    margin:6px 0;
}

.hidden { display:none; }
.empty { color:#888; text-align:center; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<h2>Login</h2>
<input id="name" placeholder="Name">
<input id="id" placeholder="ID">
<button id="loginBtn">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<header><h2 id="welcome"></h2></header>

<div class="container">

<select id="canteen"></select>

<h3>Menu</h3>
<div id="menu"></div>

<h3>Cart</h3>
<div id="cart"></div>
<p id="total">Total: ₹0</p>
<button id="orderBtn">Place Order</button>

<h3>Order History</h3>
<div id="history"></div>

<button id="logoutBtn">Logout</button>

</div>
</div>

<script>
'use strict';

// ---------- STATE ----------
let cart = [];
let currentUser = null;

// ---------- DATA ----------
const menus = {
    Ball: [
        {name:"Burger", price:50},
        {name:"Fries", price:40}
    ],
    Pencil: [
        {name:"Pizza", price:120},
        {name:"Coffee", price:20}
    ],
    KC: [
        {name:"Dosa", price:30}
    ]
};

// ---------- DOM ----------
const loginPage = document.getElementById("loginPage");
const app = document.getElementById("app");
const welcome = document.getElementById("welcome");
const menuDiv = document.getElementById("menu");
const cartDiv = document.getElementById("cart");
const historyDiv = document.getElementById("history");
const totalDiv = document.getElementById("total");
const canteenSelect = document.getElementById("canteen");

// ---------- INIT ----------
function init(){
    loadCanteens();

    document.getElementById("loginBtn").onclick = login;
    document.getElementById("logoutBtn").onclick = logout;
    document.getElementById("orderBtn").onclick = placeOrder;
    canteenSelect.onchange = renderMenu;

    autoLogin();
}

// ---------- LOGIN ----------
async function login(){
    const name = document.getElementById("name").value.trim();
    const id = document.getElementById("id").value.trim();

    if(!name || !id) return alert("Enter details");

    currentUser = {name, id};
    localStorage.setItem("user", JSON.stringify(currentUser));

    try {
        await fetch("/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(currentUser)
        });
    } catch {}

    showApp();
}

function autoLogin(){
    const user = localStorage.getItem("user");
    if(user){
        currentUser = JSON.parse(user);
        showApp();
    }
}

function showApp(){
    loginPage.classList.add("hidden");
    app.classList.remove("hidden");
    welcome.innerText = `Welcome ${currentUser.name}`;
    renderMenu();
    loadHistory();
}

function logout(){
    localStorage.clear();
    location.reload();
}

// ---------- CANTEEN ----------
function loadCanteens(){
    canteenSelect.innerHTML = Object.keys(menus)
        .map(c => `<option value="${c}">${c}</option>`)
        .join("");
}

// ---------- MENU ----------
function renderMenu(){
    const items = menus[canteenSelect.value];

    menuDiv.innerHTML = "";

    if(!items.length){
        menuDiv.innerHTML = "<p class='empty'>No items available</p>";
        return;
    }

    items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const name = document.createElement("span");
        name.innerText = `${item.name} ₹${item.price}`;

        const btn = document.createElement("button");
        btn.innerText = "Add";
        btn.onclick = () => addToCart(item);

        card.appendChild(name);
        card.appendChild(btn);

        menuDiv.appendChild(card);
    });
}

// ---------- CART ----------
function addToCart(item){
    const found = cart.find(i => i.name === item.name);
    if(found) found.qty++;
    else cart.push({...item, qty:1});
    renderCart();
}

function renderCart(){
    cartDiv.innerHTML = "";

    if(cart.length === 0){
        cartDiv.innerHTML = "<p class='empty'>Cart is empty</p>";
        totalDiv.innerText = "Total: ₹0";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.qty;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            ${item.name} x${item.qty}
        `;

        const plus = document.createElement("button");
        plus.innerText = "+";
        plus.onclick = () => changeQty(index,1);

        const minus = document.createElement("button");
        minus.innerText = "-";
        minus.onclick = () => changeQty(index,-1);

        card.appendChild(plus);
        card.appendChild(minus);

        cartDiv.appendChild(card);
    });

    totalDiv.innerText = `Total: ₹${total}`;
}

function changeQty(index, val){
    cart[index].qty += val;
    if(cart[index].qty <= 0) cart.splice(index,1);
    renderCart();
}

// ---------- ORDER ----------
async function placeOrder(){
    if(cart.length === 0) return alert("Cart empty");

    try {
        const res = await fetch("/order", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                user_id: currentUser.id,
                canteen: canteenSelect.value,
                items: cart
            })
        });

        const data = await res.json();
        alert("Order ID: " + data.order_id);

    } catch {
        alert("Order saved locally");
    }

    cart = [];
    renderCart();
    loadHistory();
}

// ---------- HISTORY ----------
async function loadHistory(){
    historyDiv.innerHTML = "Loading...";

    try {
        const res = await fetch(`/orders/${currentUser.id}`);
        const orders = await res.json();

        historyDiv.innerHTML = "";

        if(!orders.length){
            historyDiv.innerHTML = "<p class='empty'>No orders yet</p>";
            return;
        }

        orders.forEach(o => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerText = `${o.id} - ${o.canteen} (${o.status})`;
            historyDiv.appendChild(card);
        });

    } catch {
        historyDiv.innerHTML = "<p class='empty'>No backend connection</p>";
    }
}

// ---------- START ----------
init();

</script>

</body>
</html>
