<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Canteen Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f3f4f6;
}

header {
    background: #111827;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    padding: 10px;
}

.box {
    flex: 1;
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
    min-width: 280px;
}

h2 {
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
}

.item {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.add { background: #2563eb; color: white; }
.remove { background: red; color: white; }
.order { background: green; color: white; width: 100%; margin-top: 10px; }

.hidden { display: none; }

.cart-item {
    display: flex;
    justify-content: space-between;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>

<body>

<header>🍽️ Smart Canteen System</header>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Login</h2>
<input type="text" id="studentName" placeholder="Enter Name">
<input type="text" id="studentId" placeholder="Enter ID">
<button class="add" onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">

<div class="topbar">
<p id="welcome"></p>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- MENU -->
<div class="box">
<h2>Menu</h2>

<div class="item">Biryani ₹120 <button class="add" onclick="add('Biryani',120)">Add</button></div>
<div class="item">Burger ₹50 <button class="add" onclick="add('Burger',50)">Add</button></div>
<div class="item">Pizza ₹120 <button class="add" onclick="add('Pizza',120)">Add</button></div>
<div class="item">Puffs ₹30 <button class="add" onclick="add('Puffs',30)">Add</button></div>
<div class="item">Sandwich ₹40 <button class="add" onclick="add('Sandwich',40)">Add</button></div>
<div class="item">Milkshake ₹80 <button class="add" onclick="add('Milkshake',80)">Add</button></div>
<div class="item">Cold Drink ₹20 <button class="add" onclick="add('Cold Drink',20)">Add</button></div>
<div class="item">Chocolate ₹25 <button class="add" onclick="add('Chocolate',25)">Add</button></div>
<div class="item">Tea ₹10 <button class="add" onclick="add('Tea',10)">Add</button></div>

</div>

<!-- CART -->
<div class="box">
<h2>Cart</h2>
<div id="cart"></div>
<p>Total: ₹<span id="total">0</span></p>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
</select>

<select id="time">
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>12:00 PM</option>
<option>01:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
<option>04:00 PM</option>
<option>05:00 PM</option>
</select>

<button class="order" onclick="placeOrder()">Place Order</button>
</div>

<!-- HISTORY -->
<div class="box">
<h2>Order History</h2>
<div id="history"></div>
</div>

</div>

<!-- ADMIN -->
<div class="box">
<h2>Admin Panel</h2>
<button onclick="showOrders()">View All Orders</button>
<div id="admin"></div>
</div>

</div>

<script>

let cart = [];

// LOGIN
function login(){
    let name = document.getElementById("studentName").value;
    let id = document.getElementById("studentId").value;

    if(!name || !id){
        alert("Enter details");
        return;
    }

    localStorage.setItem("user", JSON.stringify({name,id}));
    initApp();
}

// INIT APP
function initApp(){
    let user = JSON.parse(localStorage.getItem("user"));
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainApp").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Welcome " + user.name;
    loadHistory();
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// CART FUNCTIONS
function add(name, price){
    let item = cart.find(i => i.name === name);
    if(item) item.qty++;
    else cart.push({name, price, qty:1});
    renderCart();
}

function renderCart(){
    let div = document.getElementById("cart");
    div.innerHTML = "";
    let total = 0;

    cart.forEach((i,index)=>{
        total += i.price * i.qty;
        div.innerHTML += `
        <div class="cart-item">
        ${i.name} x${i.qty}
        <span>
        <button onclick="changeQty(${index},1)">+</button>
        <button onclick="changeQty(${index},-1)">-</button>
        <button class="remove" onclick="removeItem(${index})">x</button>
        </span>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

function changeQty(i,val){
    cart[i].qty += val;
    if(cart[i].qty <= 0) cart.splice(i,1);
    renderCart();
}

function removeItem(i){
    cart.splice(i,1);
    renderCart();
}

// PLACE ORDER
function placeOrder(){
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let user = JSON.parse(localStorage.getItem("user"));
    let payment = document.getElementById("payment").value;
    let time = document.getElementById("time").value;

    let order = {
        id: "ORD" + Date.now(),
        user,
        cart: JSON.parse(JSON.stringify(cart)), // FIXED
        payment,
        time,
        status: "Pending"
    };

    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders.push(order);
    localStorage.setItem("orders", JSON.stringify(orders));

    alert("Order placed! ID: " + order.id);

    cart = [];
    renderCart();
    loadHistory();
}

// HISTORY
function loadHistory(){
    let user = JSON.parse(localStorage.getItem("user"));
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");

    let div = document.getElementById("history");
    div.innerHTML = "";

    orders.filter(o=>o.user.id===user.id).forEach(o=>{
        let items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");
        div.innerHTML += `<p><b>${o.id}</b> - ${items} | ${o.time} | ${o.payment} | ${o.status}</p>`;
    });
}

// ADMIN
function showOrders(){
    let user = JSON.parse(localStorage.getItem("user"));

    if(user.id !== "admin123"){
        alert("Access denied");
        return;
    }

    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    let div = document.getElementById("admin");
    div.innerHTML = "";

    orders.forEach(o=>{
        let items = o.cart.map(i => `${i.name} x${i.qty}`).join(", ");
        div.innerHTML += `
        <p>
        ${o.id} - ${o.user.name} (${o.user.id})<br>
        ${items} | ${o.time} | ${o.payment} | ${o.status}
        </p>`;
    });
}

// AUTO LOGIN
window.onload = function(){
    if(localStorage.getItem("user")){
        initApp();
    }
}

</script>

</body>
</html>
