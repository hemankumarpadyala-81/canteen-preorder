<!DOCTYPE html>
<html>
<head>
    <title>Canteen Pre-Order</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f2f2f2;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .hidden { display: none; }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        .menu {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .item {
            background: white;
            padding: 15px;
            margin: 10px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 5px gray;
        }

        img {
            width: 100%;
            height: 120px;
            border-radius: 10px;
        }

        #cart {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<header>
    <h1>Canteen Pre-Order System</h1>
</header>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
    <h2>Login</h2>
    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="text" placeholder="Student ID"><br>
    <button onclick="login()">Login</button>
</div>

<!-- MENU PAGE -->
<div class="container hidden" id="menuPage">
    <h2>Menu</h2>

    <div class="menu">
        <div class="item">
            <img src="https://via.placeholder.com/200x120?text=Burger">
            <h3>Burger</h3>
            <p>₹50</p>
            <button onclick="addToCart('Burger',50)">Add</button>
        </div>

        <div class="item">
            <img src="https://via.placeholder.com/200x120?text=Pizza">
            <h3>Pizza</h3>
            <p>₹100</p>
            <button onclick="addToCart('Pizza',100)">Add</button>
        </div>

        <div class="item">
            <img src="https://via.placeholder.com/200x120?text=Sandwich">
            <h3>Sandwich</h3>
            <p>₹40</p>
            <button onclick="addToCart('Sandwich',40)">Add</button>
        </div>
    </div>

    <!-- CART -->
    <div id="cart">
        <h2>Your Cart</h2>
        <ul id="cartItems"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>

        <label>Pickup Time:</label><br>
        <input type="time" id="time"><br><br>

        <button onclick="placeOrder()">Place Order</button>
    </div>
</div>

<script>
let cart = [];
let total = 0;

function login() {
    let name = document.getElementById("name").value;
    if(name === "") {
        alert("Enter name!");
        return;
    }

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("menuPage").classList.remove("hidden");
}

function addToCart(item, price) {
    cart.push(item);
    total += price;
    displayCart();
}

function displayCart() {
    let list = document.getElementById("cartItems");
    list.innerHTML = "";

    cart.forEach(i => {
        let li = document.createElement("li");
        li.innerText = i;
        list.appendChild(li);
    });

    document.getElementById("total").innerText = total;
}

function placeOrder() {
    let time = document.getElementById("time").value;

    if(cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    if(time === "") {
        alert("Select pickup time!");
        return;
    }

    alert("Order Confirmed!\nPickup at: " + time + "\nTotal: ₹" + total);

    cart = [];
    total = 0;
    displayCart();
}
</script>

</body>
</html>
