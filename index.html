<!DOCTYPE html>
<html>
<head>
    <title>Canteen Pre-Order</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }
        h1 {
            background-color: #333;
            color: white;
            padding: 10px;
        }
        .menu {
            margin: 20px;
        }
        .item {
            background: white;
            padding: 15px;
            margin: 10px;
            display: inline-block;
            width: 220px;
            border-radius: 10px;
        }
        .item img {
            width: 100%;
            height: 140px;
            border-radius: 10px;
        }
        button {
            background-color: green;
            color: white;
            padding: 8px;
            border: none;
            cursor: pointer;
            margin-top: 5px;
        }
        #cart {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>

<body>

<h1>Canteen Pre-Order System</h1>

<div class="menu">

    <div class="item">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" alt="Burger">
        <h3>Burger</h3>
        <p>₹50</p>
        <button onclick="addToCart('Burger')">Add</button>
    </div>

    <div class="item">
        <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953c" alt="Pizza">
        <h3>Pizza</h3>
        <p>₹100</p>
        <button onclick="addToCart('Pizza')">Add</button>
    </div>

    <div class="item">
        <img src="https://images.unsplash.com/photo-1567234669003-dce7a7a88821" alt="Sandwich">
        <h3>Sandwich</h3>
        <p>₹40</p>
        <button onclick="addToCart('Sandwich')">Add</button>
    </div>

</div>

<div id="cart">
    <h2>Your Cart</h2>
    <ul id="cartItems"></ul>

    <label>Select Pickup Time:</label><br><br>
    <input type="time" id="time"><br><br>

    <button onclick="placeOrder()">Place Order</button>
</div>

<script>
    let cart = [];

    function addToCart(item) {
        cart.push(item);
        displayCart();
    }

    function displayCart() {
        let list = document.getElementById("cartItems");
        list.innerHTML = "";
        cart.forEach(i => {
            let li = document.createElement("li");
            li.innerText = i;
            list.appendChild(li);
        });
    }

    function placeOrder() {
        let time = document.getElementById("time").value;

        if(cart.length === 0) {
            alert("Cart is empty!");
            return;
        }

        if(time === "") {
            alert("Select pickup time!");
            return;
        }

        alert("Order placed successfully!\nPickup at: " + time);
        cart = [];
        displayCart();
    }
</script>

</body>
</html>
