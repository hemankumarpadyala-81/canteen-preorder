<script>
'use strict';

let cart=[];

// MENU DATA (5 CANTEENS)
const menus={
"BALL 1":[
["Biryani",120,"https://images.unsplash.com/photo-1604908176997-125f25cc500f"],
["Samosa",20,"https://images.unsplash.com/photo-1601050690597-df0568f70950"],
["Coke",20,"https://images.unsplash.com/photo-1554866585-cd94860890b7"]
],
"BALL 2":[
["Sandwich",40,"https://images.unsplash.com/photo-1550507992-eb63ffee0847"],
["Fried Rice",100,"https://images.unsplash.com/photo-1603133872878-684f208fb84b"]
],
"PENCIL":[
["Burger",50,"https://images.unsplash.com/photo-1550547660-d9450f859349"]
],
"KC CANTEEN":[
["Dosa",40,"https://images.unsplash.com/photo-1612874742237-6526221588e3"]
],
"3RD CAMPUS":[
["Noodles",60,"https://images.unsplash.com/photo-1585032226651-759b368d7246"],
["Tea",10,"https://images.unsplash.com/photo-1509042239860-f550ce710b93"]
]
};

// LOGIN
function login(){
let name=document.getElementById("name").value.trim();
let id=document.getElementById("id").value.trim();

if(!name||!id) return alert("Enter details");

localStorage.setItem("user",JSON.stringify({name,id}));

loginBox.classList.add("hidden");
canteenBox.classList.remove("hidden");
}

// SELECT CANTEEN
function selectCanteen(c){
localStorage.setItem("canteen",c);

canteenBox.classList.add("hidden");
app.classList.remove("hidden");

cart=[]; // RESET CART (important)
renderCart();

let user=JSON.parse(localStorage.getItem("user"));
welcome.innerText=`Welcome ${user.name} | ${c}`;

loadMenu(c);
loadHistory();
}

// NAV
function goBackLogin(){
canteenBox.classList.add("hidden");
loginBox.classList.remove("hidden");
}

function goBackCanteen(){
app.classList.add("hidden");
canteenBox.classList.remove("hidden");
cart=[];
renderCart();
}

// MENU
function loadMenu(c){
let menuDiv=document.getElementById("menu");
menuDiv.innerHTML="";

if(!menus[c]){
menuDiv.innerHTML="<p>No menu available</p>";
return;
}

menus[c].forEach(i=>{
menuDiv.innerHTML+=`
<div class="card">
<img src="${i[2]}">
<p>${i[0]} ₹${i[1]}</p>
<button onclick="addItem('${i[0]}',${i[1]})">Add</button>
</div>`;
});
}

// CART
function addItem(n,p){
let item=cart.find(i=>i.name===n);

if(item) item.qty++;
else cart.push({name:n,price:p,qty:1});

renderCart();
}

function changeQty(index,val){
cart[index].qty += val;
if(cart[index].qty<=0) cart.splice(index,1);
renderCart();
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

function renderCart(){
let cartDiv=document.getElementById("cart");
cartDiv.innerHTML="";
let total=0;

cart.forEach((i,index)=>{
total += i.price*i.qty;

cartDiv.innerHTML+=`
<div class="cart-item">
${i.name} x${i.qty}
<span>
<button onclick="changeQty(${index},1)">+</button>
<button onclick="changeQty(${index},-1)">-</button>
<button class="danger" onclick="removeItem(${index})">x</button>
</span>
</div>`;
});

document.getElementById("total").innerText=total;
}

// ORDER
function placeOrder(){
if(cart.length===0) return alert("Cart empty");

let user=JSON.parse(localStorage.getItem("user"));
let canteen=localStorage.getItem("canteen");

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

orders.push({
id:"ORD"+Date.now(),
user,
canteen,
cart: JSON.parse(JSON.stringify(cart)), // SAFE COPY
status:"Pending",
time:new Date().toLocaleString()
});

localStorage.setItem("orders",JSON.stringify(orders));

cart=[];
renderCart();
loadHistory();

alert("Order placed!");
}

// HISTORY
function loadHistory(){
let user=JSON.parse(localStorage.getItem("user"));
let orders=JSON.parse(localStorage.getItem("orders")||"[]");

history.innerHTML="";

orders.filter(o=>o.user.id===user.id)
.reverse()
.forEach(o=>{
let items=o.cart.map(i=>`${i.name} x${i.qty}`).join(", ");

history.innerHTML+=`
<div class="card">
<b>${o.id}</b> (${o.status})<br>
${items}<br>
<small>${o.time}</small>
</div>`;
});
}

// ADMIN
function showOrders(){
let user=JSON.parse(localStorage.getItem("user"));

if(user.id!=="admin123") return alert("Access denied");

let orders=JSON.parse(localStorage.getItem("orders")||"[]");

admin.innerHTML="";

orders.forEach((o,index)=>{
admin.innerHTML+=`
<div class="card">
${o.id} - ${o.user.name} - ${o.canteen}<br>
Status: ${o.status}
<br>
<button onclick="markReady(${index})">Mark Ready</button>
</div>`;
});
}

function markReady(i){
let orders=JSON.parse(localStorage.getItem("orders"));
orders[i].status="Ready";
localStorage.setItem("orders",JSON.stringify(orders));
showOrders();
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}
</script>
