<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canteen Preorder System</title>
<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
header { background:#2c3e50; color:white; padding:15px; text-align:center; }
.container { padding:20px; }
.menu, .cart, .history, .admin { margin-bottom:25px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
button { padding:8px 12px; border:none; border-radius:5px; cursor:pointer; }
.add { background:#27ae60; color:white; }
.remove { background:#e74c3c; color:white; }
.primary { background:#2980b9; color:white; }
</style>
</head>
<body>
<header>
<h2>Canteen Preorder System</h2>
</header>

<div class="container">

<div class="menu">
<h3>Menu</h3>
<div id="menuList"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartList"></div>
<button class="primary" onclick="placeOrder()">Place Order</button>
<button onclick="undo()">Undo</button>
<button onclick="redo()">Redo</button>
</div>

<div class="history">
<h3>Order History</h3>
<div id="historyList"></div>
</div>

<div class="admin">
<h3>Admin Panel</h3>
<input type="text" id="itemName" placeholder="Item Name">
<input type="number" id="itemPrice" placeholder="Price">
<button onclick="addItem()">Add Item</button>
</div>

</div>

<script>
let menu = [
 {name:"Burger", price:50, img:"https://via.placeholder.com/100"},
 {name:"Pizza", price:120, img:"https://via.placeholder.com/100"},
 {name:"Tea", price:10, img:"https://via.placeholder.com/100"}
];

let cart = [];
let history = [];
let undoStack = [];
let redoStack = [];

function renderMenu() {
 let html="";
 menu.forEach((item,i)=>{
 html += `<div class='card'>
 <img src='${item.img}' width='80'>
 <h4>${item.name}</h4>
 <p>₹${item.price}</p>
 <button class='add' onclick='addToCart(${i})'>Add</button>
 </div>`;
 });
 document.getElementById("menuList").innerHTML = html;
}

function renderCart() {
 let html="";
 cart.forEach((item,i)=>{
 html += `<div class='card'>${item.name} - ₹${item.price}
 <button class='remove' onclick='removeFromCart(${i})'>Remove</button>
 </div>`;
 });
 document.getElementById("cartList").innerHTML = html;
}

function renderHistory() {
 let html="";
 history.forEach(order=>{
 html += `<div class='card'>${order.map(i=>i.name).join(", ")}</div>`;
 });
 document.getElementById("historyList").innerHTML = html;
}

function saveState() {
 undoStack.push(JSON.stringify(cart));
 redoStack = [];
}

function addToCart(i) {
 saveState();
 cart.push(menu[i]);
 renderCart();
}

function removeFromCart(i) {
 saveState();
 cart.splice(i,1);
 renderCart();
}

function placeOrder() {
 if(cart.length === 0) return alert("Cart empty");
 history.push([...cart]);
 cart = [];
 renderCart();
 renderHistory();
}

function undo() {
 if(undoStack.length === 0) return;
 redoStack.push(JSON.stringify(cart));
 cart = JSON.parse(undoStack.pop());
 renderCart();
}

function redo() {
 if(redoStack.length === 0) return;
 undoStack.push(JSON.stringify(cart));
 cart = JSON.parse(redoStack.pop());
 renderCart();
}

function addItem() {
 let name = document.getElementById("itemName").value;
 let price = document.getElementById("itemPrice").value;
 if(!name || !price) return alert("Enter details");
 menu.push({name, price, img:"https://via.placeholder.com/100"});
 renderMenu();
}

renderMenu();
renderCart();
renderHistory();
</script>

</body>
</html>
