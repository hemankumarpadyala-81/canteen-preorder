<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Canteen System</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0}
header{background:#2c3e50;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:8px}
button{padding:6px 10px;border:none;border-radius:5px;background:#2980b9;color:#fff}
</style>

</head>
<body>

<div id="loginPage" class="container">
<h2>Login</h2>
<input id="name" placeholder="Name"><br><br>
<input id="id" placeholder="ID"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<header><h2 id="welcome"></h2></header>

<div class="container">

<select id="canteen">
<option>Ball</option>
<option>Pencil</option>
<option>KC</option>
</select>

<h3>Menu</h3>
<div id="menu"></div>

<h3>Cart</h3>
<div id="cart"></div>
<p id="total">Total: ₹0</p>
<button onclick="placeOrder()">Place Order</button>

<h3>History</h3>
<div id="history"></div>

<button onclick="logout()">Logout</button>

</div>
</div>

<script>

let cart=[];

const menus={
Ball:[{name:"Burger",price:50},{name:"Fries",price:40}],
Pencil:[{name:"Pizza",price:120},{name:"Coffee",price:20}],
KC:[{name:"Dosa",price:30}]
};

// LOGIN
async function login(){
 let name=document.getElementById("name").value;
 let id=document.getElementById("id").value;

 if(!name||!id){alert("Enter details");return;}

 await fetch("/login",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({name,id})
 });

 localStorage.setItem("user",JSON.stringify({name,id}));

 document.getElementById("loginPage").style.display="none";
 document.getElementById("app").style.display="block";

 document.getElementById("welcome").innerText="Welcome "+name;

 loadMenu();
 loadHistory();
}

// MENU
function loadMenu(){
 let c=document.getElementById("canteen").value;
 let div=document.getElementById("menu");

 div.innerHTML="";
 menus[c].forEach(item=>{
 div.innerHTML+=`
 <div class="card">
 ${item.name} ₹${item.price}
 <button onclick='add(${JSON.stringify(item)})'>Add</button>
 </div>`;
 });
}

// CART
function add(item){
 let f=cart.find(i=>i.name===item.name);
 if(f)f.qty++;
 else cart.push({...item,qty:1});
 renderCart();
}

function renderCart(){
 let div=document.getElementById("cart");
 let total=0;

 div.innerHTML=cart.map(i=>{
 total+=i.price*i.qty;
 return `${i.name} x${i.qty}<br>`;
 }).join("");

 document.getElementById("total").innerText="Total: ₹"+total;
}

// ORDER
async function placeOrder(){
 if(cart.length===0){alert("Cart empty");return;}

 let user=JSON.parse(localStorage.getItem("user"));

 let res=await fetch("/order",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
 user_id:user.id,
 canteen:document.getElementById("canteen").value,
 items:cart
 })
 });

 let data=await res.json();

 alert("Order placed! "+data.order_id);

 cart=[];
 renderCart();
 loadHistory();
}

// HISTORY
async function loadHistory(){
 let user=JSON.parse(localStorage.getItem("user"));

 let res=await fetch(`/orders/${user.id}`);
 let orders=await res.json();

 let div=document.getElementById("history");
 div.innerHTML="";

 orders.forEach(o=>{
 div.innerHTML+=`
 <div class="card">
 ${o[0]} - ${o[4]} (${o[5]})
 </div>`;
 });
}

// LOGOUT
function logout(){
 localStorage.clear();
 location.reload();
}

// INIT
window.onload=()=>{
 if(localStorage.getItem("user")){
 let user=JSON.parse(localStorage.getItem("user"));
 document.getElementById("loginPage").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("welcome").innerText="Welcome "+user.name;
 loadMenu();
 loadHistory();
 }
}

</script>

</body>
</html>
